<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Newsletter Waouh Monde — Bold graphique EDITABLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #e8ecf1; font-family: 'Inter', system-ui, sans-serif; }
    * { box-sizing: border-box; }
    .page { display: flex; justify-content: center; padding: 32px 16px; }
    .page > div { box-shadow: 0 20px 60px rgba(10,30,60,0.18); border-radius: 4px; overflow: hidden; }
    @media print { body { background: white; } .page { padding: 0; } .page > div { box-shadow: none; border-radius: 0; } }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div class="page"><div id="root"></div></div>

  <!-- ============================================================
       ZONE ÉDITABLE — Modifie uniquement ce bloc <script>
       ============================================================ -->
  <script type="text/babel">

// ── Couleurs ─────────────────────────────────────────────────────────────────
const ink       = '#0a1628';
const brandBlue = '#1f7fc7';
const deep      = '#0e2448';
const cyan      = '#6fc2d9';
const yellow    = '#ffd54a';
const cream     = '#fff8e7';
const soft      = '#eef4fb';

// ── Icônes SVG ───────────────────────────────────────────────────────────────
const icons = {
  mail: (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/>
    </svg>
  ),
  palette: (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <circle cx="8" cy="10" r="1.2" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="7.5" r="1.2" fill="currentColor" stroke="none"/>
      <circle cx="16" cy="10" r="1.2" fill="currentColor" stroke="none"/>
      <path d="M12 22c0-3 3-4 3-7"/>
    </svg>
  ),
  globe: (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
  ),
  briefcase: (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <rect x="2" y="7" width="20" height="14" rx="2"/>
      <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      <line x1="12" y1="12" x2="12" y2="12.01"/>
    </svg>
  ),
  phone: (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.06 6.06l1.09-.91a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7a2 2 0 0 1 1.72 2.02z"/>
    </svg>
  ),
  mailSm: (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/>
    </svg>
  ),
  globeSm: (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
  ),
  arrow: (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/>
    </svg>
  ),
  check: (
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="1.5,6 4.5,9 10.5,3"/>
    </svg>
  ),
};

// ── Composant Card (grille solutions) ────────────────────────────────────────
const Card = ({ n, icon, title, desc, price, bg, fg }) => (
  <div style={{ background: bg, color: fg, borderRadius: 18, padding: '22px 22px 20px', display: 'flex', flexDirection: 'column', gap: 10, minHeight: 180, position: 'relative', overflow: 'hidden' }}>
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
      <div style={{ fontFamily: '"DM Serif Display", serif', fontSize: 38, lineHeight: 1, opacity: 0.9 }}>0{n}</div>
      <div style={{ opacity: 0.85 }}>{icon}</div>
    </div>
    <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.25, marginTop: 6 }}>{title}</div>
    <div style={{ fontSize: 12.5, lineHeight: 1.5, opacity: 0.85, flex: 1 }}>{desc}</div>
    <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 0.5, paddingTop: 10, borderTop: `1px solid ${fg === 'white' ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.12)'}` }}>
      {price.toUpperCase()}
    </div>
  </div>
);

// ── Composant principal ──────────────────────────────────────────────────────
const Newsletter = () => (
  <div style={{ width: 720, background: 'white', fontFamily: '"Inter", system-ui, sans-serif', color: ink, fontSize: 14, lineHeight: 1.6 }}>

    {/* ── HEADER ── */}
    <div style={{
      position: 'relative',
      backgroundImage: 'linear-gradient(100deg, rgba(14,36,72,0.75) 0%, rgba(14,36,72,0.25) 100%), url(https://images.pexels.com/photos/3760067/pexels-photo-3760067.jpeg?auto=compress&cs=tinysrgb&w=1600)',
      backgroundSize: 'cover', backgroundPosition: 'center',
      color: 'white', padding: '36px 44px 48px',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 36 }}>
        {/* ✏️ Logo */}
        <img src="assets/waouh-logo.png" alt="Waouh Monde" style={{ height: 48, filter: 'brightness(0) invert(1)' }} />
        <div style={{ fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', background: yellow, color: deep, padding: '6px 12px', borderRadius: 999, fontWeight: 700 }}>
          Bénin · Depuis 2019
        </div>
      </div>
      <div style={{ maxWidth: 520 }}>
        <div style={{ fontSize: 11, letterSpacing: 2, textTransform: 'uppercase', opacity: 0.7, marginBottom: 10 }}>
          Objet de l'email
        </div>
        {/* ✏️ Titre principal — remplace [Nom Entreprise] */}
        <h1 style={{ fontFamily: '"DM Serif Display", "Times New Roman", serif', fontSize: 42, lineHeight: 1.05, fontWeight: 400, margin: 0, letterSpacing: -0.5 }}>
          [Nom Entreprise], <span style={{ color: yellow }}>Waouh Monde</span> accompagne votre transformation digitale
        </h1>
      </div>
    </div>

    {/* ── INTRO ── */}
    <div style={{ padding: '40px 44px 28px' }}>
      {/* ✏️ Salutation */}
      <div style={{ fontSize: 15, marginBottom: 18 }}>Bonjour <strong>[Civilité] [Nom]</strong>,</div>
      <p style={{ margin: '0 0 14px 0', fontSize: 15, lineHeight: 1.65 }}>
        Nous sommes <strong style={{ background: `linear-gradient(transparent 60%, ${yellow} 60%)`, padding: '0 2px' }}>Waouh Monde</strong>, votre Entreprise de Services du Numérique basée à Abomey-Calavi depuis 2019. Nous accompagnons les professionnels, entreprises et institutions béninoises dans leur transformation digitale.
      </p>
      {/* ✏️ Remplace [Nom Entreprise] */}
      <p style={{ margin: 0, fontSize: 15, lineHeight: 1.65 }}>
        Nous souhaitons aujourd'hui mettre notre expertise au service de <strong>[Nom Entreprise]</strong>.
      </p>
    </div>

    {/* ── SOLUTIONS ── */}
    <div style={{ padding: '20px 44px 32px' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 20 }}>
        <div style={{ fontFamily: '"DM Serif Display", serif', fontSize: 28, color: deep, lineHeight: 1 }}>Nos solutions</div>
        <div style={{ flex: 1, height: 1, background: '#e3e8ef' }} />
        <div style={{ fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase', color: '#6b7a95' }}>pour votre entreprise</div>
      </div>
      {/* ✏️ Ajoute / modifie / supprime des Card */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
        <Card n={1} icon={icons.mail}      title="Crédibilité professionnelle" desc="Email @votreentreprise.com + Google Maps + référencement"    price="à partir de 35 000 FCFA" bg={deep}      fg="white" />
        <Card n={2} icon={icons.palette}   title="Identité visuelle cohérente" desc="Logo, charte graphique, supports print et digital"            price="à partir de 80 000 FCFA" bg={cream}     fg={ink}   />
        <Card n={3} icon={icons.globe}     title="Présence web complète"       desc="Sites vitrine, e-commerce, applications métier sur-mesure"    price="sur devis"               bg={soft}      fg={ink}   />
        <Card n={4} icon={icons.briefcase} title="Applications de gestion"     desc="Solutions adaptées à vos processus internes"                  price="sur devis"               bg={brandBlue} fg="white" />
      </div>
    </div>

    {/* ── ARGUMENTS ── */}
    <div style={{ margin: '12px 44px 32px', padding: '28px 28px', background: cream, borderRadius: 18, border: `2px solid ${yellow}` }}>
      <div style={{ fontFamily: '"DM Serif Display", serif', fontSize: 24, color: deep, marginBottom: 18, lineHeight: 1.1 }}>
        Pourquoi travailler<br/>avec <em>Waouh Monde</em> ?
      </div>
      {/* ✏️ Modifie les arguments */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
        {[
          'Entreprise béninoise avec références institutionnelles vérifiables',
          'Équipe technique locale qui comprend vos réalités',
          'Solutions adaptées au contexte et aux budgets locaux',
          'Support en français et suivi personnalisé de proximité',
        ].map((t, i) => (
          <div key={i} style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
            <span style={{ width: 22, height: 22, borderRadius: 6, background: deep, color: yellow, display: 'grid', placeItems: 'center', flexShrink: 0 }}>
              {icons.check}
            </span>
            <span style={{ fontSize: 13.5, lineHeight: 1.45 }}>{t}</span>
          </div>
        ))}
      </div>
    </div>

    {/* ── LIEN PORTFOLIO ── */}
    <div style={{ padding: '0 44px 32px' }}>
      <div style={{ background: 'white', border: `1px dashed ${brandBlue}`, borderRadius: 12, padding: '18px 22px' }}>
        <div style={{ fontSize: 13, color: '#4a5878', marginBottom: 6 }}>Découvrez nos réalisations :</div>
        {/* ✏️ Modifie l'URL si besoin */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 14, color: brandBlue, fontWeight: 600, marginBottom: 12 }}>
          {icons.arrow}
          <a href="https://www.waouhmonde.com/leffet-waouh/" style={{ color: brandBlue, textDecoration: 'none' }}>https://www.waouhmonde.com/leffet-waouh/</a>
        </div>
        <div style={{ fontSize: 13, lineHeight: 1.55, color: '#3d4a66' }}>
          Vous pouvez accéder à notre catalogue de solutions prêtes à l'emploi des applications métier déjà développées que vous pouvez adopter rapidement pour votre secteur d'activité.
        </div>
      </div>
    </div>

    {/* ── CTA ── */}
    <div style={{ padding: '0 44px 40px' }}>
      <div style={{ fontFamily: '"DM Serif Display", serif', fontSize: 28, color: deep, marginBottom: 16, lineHeight: 1 }}>Prochaine étape ?</div>
      {/* ✏️ Modifie les actions et couleurs d'accent */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {[
          { a: 'Soumettez votre projet en ligne',            b: 'https://votreprojet.waouhmonde.com/', c: cyan   },
          { a: 'Appelez-nous directement : 01 69 50 71 71', b: 'pour passer commande',                c: yellow },
          { a: 'Répondez à ce mail avec vos questions',     b: 'nous vous rappelons',                c: '#e8b3ff' },
        ].map((s, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '14px 18px', background: 'white', border: '1px solid #e3e8ef', borderRadius: 14 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: s.c, display: 'grid', placeItems: 'center', color: deep, flexShrink: 0 }}>
              {icons.arrow}
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 600, color: ink }}>{s.a}</div>
              <div style={{ fontSize: 12.5, color: '#6b7a95' }}>{s.b}</div>
            </div>
          </div>
        ))}
      </div>
      {/* ✏️ Remplace [Nom Entreprise] */}
      <p style={{ margin: '28px 0 6px 0', fontSize: 15 }}>
        Nous serions ravis d'accompagner <strong>[Nom Entreprise]</strong> dans sa transformation numérique.
      </p>
      <div style={{ fontSize: 14 }}>Cordialement,</div>
    </div>

    {/* ── FOOTER ── */}
    <div style={{ padding: '28px 44px', background: deep, color: 'white', borderTop: `6px solid ${yellow}` }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 20, alignItems: 'end' }}>
        <div>
          <div style={{ fontFamily: '"DM Serif Display", serif', fontSize: 26, lineHeight: 1 }}>Waouh Monde SARL</div>
          <div style={{ fontSize: 12, opacity: 0.7, marginTop: 6 }}>Entreprise de Services du Numérique · Abomey-Calavi, Bénin</div>
        </div>
        {/* ✏️ Coordonnées */}
        <div style={{ fontSize: 12.5, lineHeight: 2, textAlign: 'right' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 8 }}>{icons.phone}   01 69 50 71 71</div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 8 }}>{icons.mailSm} contact@waouhmonde.com</div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 8 }}>{icons.globeSm} www.waouhmonde.com</div>
        </div>
      </div>
    </div>

  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<Newsletter />);
  </script>
</body>
</html>
